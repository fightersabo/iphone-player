name: AnimePlayer
options:
  bundleIdPrefix: com.animeplayer
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  AnimePlayer:
    type: application
    platform: iOS
    sources:
      - AnimePlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.animeplayer.app
        INFOPLIST_FILE: AnimePlayer/Resources/Info.plist
    dependencies: []
